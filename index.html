<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcadores — Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      Vault
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Pesquisar marcadores..." autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" title="Alternar tema">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="btn-primary" id="addBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar
      </button>
    </div>
  </header>

  <div class="main">
    <!-- SIDEBAR -->
    <aside>
      <span class="nav-section-label">Biblioteca</span>
      <div class="nav-item active" data-view="all" onclick="setView('all',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Todos
        <span class="badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" data-view="pinned" onclick="setView('pinned',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Fixados
        <span class="badge" id="badge-pinned">0</span>
      </div>
      <div class="nav-item" data-view="archived" onclick="setView('archived',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Arquivados
        <span class="badge" id="badge-archived">0</span>
      </div>

      <span class="nav-section-label" style="margin-top:6px">Tags</span>
      <div class="tags-list" id="tagsList"></div>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <div class="toolbar">
        <span class="section-title" id="sectionTitle">Todos os Marcadores</span>
        <div class="toolbar-right">
          <select class="sort-select" id="sortSelect" onchange="render()">
            <option value="recent">Adicionados recentemente</option>
            <option value="visited">Visitados recentemente</option>
            <option value="popular">Mais visitados</option>
          </select>
        </div>
      </div>
      <div class="active-tags" id="activeTagsBar"></div>
      <div id="archivedBanner" style="display:none" class="archived-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Modo arquivados — itens abaixo foram arquivados e não aparecem na biblioteca principal.
      </div>
      <div class="bookmarks-grid" id="bookmarksGrid"></div>
    </main>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Adicionar Marcador</span>
      <button class="btn-icon" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">URL *</label>
        <input class="field-input" id="fieldUrl" type="url" placeholder="https://exemplo.com">
        <span class="field-error" id="errUrl"></span>
      </div>
      <div class="field">
        <label class="field-label">Título *</label>
        <input class="field-input" id="fieldTitle" type="text" placeholder="Título do marcador">
        <span class="field-error" id="errTitle"></span>
      </div>
      <div class="field">
        <label class="field-label">Descrição</label>
        <textarea class="field-textarea" id="fieldDesc" placeholder="Breve descrição (opcional)"></textarea>
      </div>
      <div class="field">
        <label class="field-label">Tags</label>
        <div class="tags-input-wrap" id="tagsInputWrap" onclick="document.getElementById('tagRaw').focus()">
          <div id="tagPillsContainer"></div>
          <input class="tags-input" id="tagRaw" placeholder="Adicionar tag…" autocomplete="off">
        </div>
        <span class="tags-hint">Pressione Enter ou vírgula para adicionar</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveBookmark()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar
      </button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
